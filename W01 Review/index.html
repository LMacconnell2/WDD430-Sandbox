<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week 1 Review - Tic Tac Toe</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1 class="title">Week 1 Review - Tic Tac Toe</h1>
    </header>
    <main>
        <section class="buttons">
            <button id="reset">Reset Game</button>
            <button id="undo">Undo Move</button>
            <button id="redo">Redo Move</button>
        </section>
        <div class="turn">
            <h2 id="turn-indicator">Player X's Turn</h2>
        </div>
        <section class="board">
            <button id="cell-1" class="cell"></button>
            <button id="cell-2" class="cell"></button>
            <button id="cell-3" class="cell"></button>
            <button id="cell-4" class="cell"></button>
            <button id="cell-5" class="cell"></button>
            <button id="cell-6" class="cell"></button>
            <button id="cell-7" class="cell"></button>
            <button id="cell-8" class="cell"></button>
            <button id="cell-9" class="cell"></button>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Week 1 Review - Tic Tac Toe. All rights reserved.</p>
    </footer>
</body>
</html>
